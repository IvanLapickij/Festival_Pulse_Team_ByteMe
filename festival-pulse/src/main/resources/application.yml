spring:
  application:
    name: festival-pulse

  datasource:
    url: jdbc:h2:mem:festivalpulse
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true   # http://localhost:8080/h2-console

  jpa:
    hibernate:
      ddl-auto: none  # schema.sql drives DDL
    show-sql: false

  sql:
    init:
      mode: always

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: festival-pulse
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.festivalpulse.*"
        spring.json.value.default.type: "com.festivalpulse.kafka.ReportEvent"

festival:
  crowd:
    alert-threshold: 80   # % capacity that triggers an alert
