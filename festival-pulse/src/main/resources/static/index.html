<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Festival Pulse – Steward Report</title>
  <style>
    :root {
      --bg: #0f1a14;
      --panel: #1a2820;
      --border: #2d4035;
      --text: #e8f5e9;
      --muted: #7a9e82;
      --teal: #2dd4bf;
      --low: #22c55e;
      --medium: #f59e0b;
      --full: #ef4444;
      --shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
    }

    .brand { display: flex; align-items: center; gap: 10px; }
    .brand-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--teal);
      box-shadow: 0 0 8px var(--teal);
      animation: blink 2s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .brand h1 { font-size: 16px; font-weight: 900; letter-spacing: 0.5px; }
    .brand span { font-size: 12px; color: var(--muted); margin-left: 6px; }

    /* ── Layout ── */
    .layout {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 0;
      overflow: hidden;
    }

    /* ── Map ── */
    .map-wrap {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .map-hint {
      font-size: 13px;
      color: var(--muted);
      font-weight: 600;
    }

    .map-frame {
      flex: 1;
      border: 2px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      background: #1b3022;
      box-shadow: var(--shadow);
    }

    #steward-map {
      display: block;
      width: 100%;
      height: 100%;
      min-height: 480px;
    }

    /* SVG area zones */
    .s-area { cursor: pointer; }

    .s-shape {
      stroke: rgba(255,255,255,0.15);
      stroke-width: 2;
      transition: opacity 0.15s;
      rx: 12;
    }

    .s-shape.level-low    { fill: #166534; }
    .s-shape.level-medium { fill: #92400e; }
    .s-shape.level-full   { fill: #7f1d1d; }
    .s-shape.level-unknown { fill: #1e3a2a; }

    .s-area:hover .s-shape,
    .s-area.selected .s-shape {
      stroke: var(--teal);
      stroke-width: 3;
      opacity: 1;
    }

    .s-area.selected .s-shape {
      stroke-width: 4;
      filter: drop-shadow(0 0 10px rgba(45,212,191,0.6));
    }

    .s-label, .s-icon, .s-level {
      pointer-events: none;
      text-anchor: middle;
    }
    .s-label  { fill: rgba(255,255,255,0.9); font-size: 14px; font-weight: 800; }
    .s-icon   { fill: rgba(255,255,255,0.7); font-size: 18px; }
    .s-level  { fill: rgba(255,255,255,0.5); font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }

    /* ── Report Panel ── */
    .report-panel {
      background: var(--panel);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 24px 20px;
      gap: 20px;
      overflow-y: auto;
    }

    .panel-title {
      font-size: 13px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--teal);
    }

    /* Selected area display */
    #selected-area-display {
      background: #0f1a14;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      min-height: 56px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #selected-area-display .area-icon-lg { font-size: 22px; }
    #selected-area-display .area-name { font-size: 16px; font-weight: 900; }
    #selected-area-display .area-prompt { color: var(--muted); font-size: 13px; }

    /* Crowd level buttons */
    .level-buttons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .level-btn {
      border: 2px solid var(--border);
      border-radius: 10px;
      background: #0f1a14;
      color: var(--text);
      font-size: 13px;
      font-weight: 900;
      padding: 14px 8px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      transition: border-color 0.15s, background 0.15s;
    }

    .level-btn .btn-icon { font-size: 22px; }

    .level-btn[data-level="LOW"]:hover,
    .level-btn[data-level="LOW"].active {
      border-color: var(--low);
      background: rgba(34,197,94,0.12);
      color: #86efac;
    }

    .level-btn[data-level="MEDIUM"]:hover,
    .level-btn[data-level="MEDIUM"].active {
      border-color: var(--medium);
      background: rgba(245,158,11,0.12);
      color: #fcd34d;
    }

    .level-btn[data-level="FULL"]:hover,
    .level-btn[data-level="FULL"].active {
      border-color: var(--full);
      background: rgba(239,68,68,0.15);
      color: #fca5a5;
    }

    /* Note field */
    textarea {
      width: 100%;
      background: #0f1a14;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font: inherit;
      font-size: 14px;
      padding: 10px 12px;
      resize: none;
      height: 72px;
    }

    textarea::placeholder { color: var(--muted); }
    textarea:focus { outline: none; border-color: var(--teal); }

    /* Submit button */
    #submit-btn {
      width: 100%;
      min-height: 52px;
      border: none;
      border-radius: 10px;
      background: var(--teal);
      color: #042f2e;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }

    #submit-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    #submit-btn:not(:disabled):hover { opacity: 0.9; transform: translateY(-1px); }
    #submit-btn:not(:disabled):active { transform: translateY(0); }

    /* Toast feedback */
    #toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1a2820;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 24px;
      font-size: 15px;
      font-weight: 700;
      opacity: 0;
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none;
      z-index: 100;
      white-space: nowrap;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    #toast.success { border-color: var(--low); color: #86efac; }
    #toast.error   { border-color: var(--full); color: #fca5a5; }

    /* Steward name */
    input[type="text"] {
      width: 100%;
      min-height: 42px;
      background: #0f1a14;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font: inherit;
      font-size: 14px;
      padding: 0 12px;
    }

    input[type="text"]::placeholder { color: var(--muted); }
    input[type="text"]:focus { outline: none; border-color: var(--teal); }

    label {
      font-size: 12px;
      font-weight: 800;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .field { display: flex; flex-direction: column; gap: 6px; }

    /* Responsive */
    @media (max-width: 760px) {
      .layout { grid-template-columns: 1fr; grid-template-rows: 1fr auto; }
      .report-panel { border-left: none; border-top: 1px solid var(--border); }
      #steward-map { min-height: 320px; }
    }
  </style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-dot"></div>
    <h1>Festival Pulse</h1>
    <span>Steward View</span>
  </div>
  <a href="dashboard.html" style="font-size:13px;color:var(--muted);font-weight:700;">Organiser Dashboard →</a>
</header>

<div class="layout">

  <!-- Map -->
  <div class="map-wrap">
    <p class="map-hint">Tap an area to select it, then submit your crowd report →</p>
    <div class="map-frame">
      <svg id="steward-map" viewBox="0 0 920 580" role="img" aria-label="Festival area map">
        <defs>
          <linearGradient id="s-ground" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#1b3022"/>
            <stop offset="100%" stop-color="#152a1c"/>
          </linearGradient>
        </defs>

        <rect x="0" y="0" width="920" height="580" fill="url(#s-ground)"/>
        <rect x="12" y="12" width="896" height="556" rx="16"
              fill="none" stroke="#2d4035" stroke-width="2" stroke-dasharray="10 6" opacity="0.6"/>

        <!-- Walkways -->
        <path d="M80 490 Q200 380 340 320 Q480 260 620 200 Q740 150 840 110"
              fill="none" stroke="#3a3020" stroke-width="26" stroke-linecap="round" opacity="0.9"/>
        <path d="M130 160 Q260 195 390 210 Q520 225 650 310 Q750 370 810 385"
              fill="none" stroke="#3a3020" stroke-width="16" stroke-linecap="round" opacity="0.7"/>
        <path d="M340 320 Q368 342 396 360"
              fill="none" stroke="#3a3020" stroke-width="12" stroke-linecap="round" opacity="0.6"/>

        <!-- Compass -->
        <g transform="translate(878,550)">
          <circle r="15" fill="rgba(0,0,0,0.4)"/>
          <text text-anchor="middle" dominant-baseline="central" fill="#7a9e82" font-size="10" font-weight="900">N↑</text>
        </g>

        <g id="s-areas"></g>
      </svg>
    </div>
  </div>

  <!-- Report panel -->
  <div class="report-panel">
    <p class="panel-title">Crowd Report</p>

    <!-- Selected area -->
    <div class="field">
      <label>Selected Area</label>
      <div id="selected-area-display">
        <span class="area-prompt">← Tap an area on the map</span>
      </div>
    </div>

    <!-- Crowd level -->
    <div class="field">
      <label>Crowd Level</label>
      <div class="level-buttons">
        <button class="level-btn" data-level="LOW" type="button">
          <span class="btn-icon">🟢</span>LOW
        </button>
        <button class="level-btn" data-level="MEDIUM" type="button">
          <span class="btn-icon">🟡</span>MEDIUM
        </button>
        <button class="level-btn" data-level="FULL" type="button">
          <span class="btn-icon">🔴</span>FULL
        </button>
      </div>
    </div>

    <!-- Note -->
    <div class="field">
      <label>Note <span style="font-weight:400;text-transform:none">(optional)</span></label>
      <textarea id="note" placeholder="e.g. Queue forming at entrance…"></textarea>
    </div>

    <!-- Steward name -->
    <div class="field">
      <label>Your Name <span style="font-weight:400;text-transform:none">(optional)</span></label>
      <input type="text" id="steward" placeholder="Steward name" maxlength="100">
    </div>

    <button id="submit-btn" disabled>Select an area first</button>
  </div>
</div>

<div id="toast"></div>

<script>
  const AREA_SHAPES = [
    { name: "Main Stage",      x: 56,  y: 62,  w: 300, h: 170, icon: "🎤" },
    { name: "Food Village",    x: 540, y: 54,  w: 300, h: 150, icon: "🍔" },
    { name: "Dance Tent",      x: 88,  y: 324, w: 248, h: 170, icon: "🎧" },
    { name: "Bar Area",        x: 396, y: 348, w: 222, h: 130, icon: "🍺" },
    { name: "Entrance / Exit", x: 666, y: 386, w: 190, h: 104, icon: "🚪" }
  ];

  let selectedAreaId = null;
  let selectedLevel  = null;
  let areas          = [];

  const svgAreas   = document.getElementById("s-areas");
  const display    = document.getElementById("selected-area-display");
  const submitBtn  = document.getElementById("submit-btn");
  const toast      = document.getElementById("toast");
  const NS         = "http://www.w3.org/2000/svg";

  function shapeFor(area) {
    return AREA_SHAPES.find(s => s.name === area.name)
      || { x: 100, y: 100, w: 200, h: 120, icon: "📍" };
  }

  function svgEl(tag, attrs) {
    const el = document.createElementNS(NS, tag);
    for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
    return el;
  }

  function svgText(tag, attrs, text) {
    const el = svgEl(tag, attrs);
    el.textContent = text;
    return el;
  }

  function levelClass(level) {
    return `level-${(level || "unknown").toLowerCase()}`;
  }

  function renderMap() {
    svgAreas.innerHTML = "";
    areas.forEach(area => {
      const s  = shapeFor(area);
      const cx = s.x + s.w / 2;
      const cy = s.y + s.h / 2;
      const level = area.currentCrowdLevel;

      const g = svgEl("g", { class: "s-area", role: "button", "aria-label": area.name });
      if (String(area.id) === String(selectedAreaId)) g.classList.add("selected");

      g.append(
        svgEl("rect",  { x: s.x, y: s.y, width: s.w, height: s.h, rx: 12, class: `s-shape ${levelClass(level)}` }),
        svgText("text", { x: cx, y: cy - 18, class: "s-icon" }, s.icon),
        svgText("text", { x: cx, y: cy + 4,  class: "s-label" }, area.name),
        svgText("text", { x: cx, y: cy + 20, class: "s-level" }, level || "NO DATA")
      );

      g.addEventListener("click", () => selectArea(area));
      svgAreas.appendChild(g);
    });
  }

  function selectArea(area) {
    selectedAreaId = area.id;
    const s = shapeFor(area);
    display.innerHTML = `
      <span class="area-icon-lg">${s.icon}</span>
      <span class="area-name">${area.name}</span>
    `;
    renderMap();
    updateSubmitBtn();
  }

  function selectLevel(level) {
    selectedLevel = level;
    document.querySelectorAll(".level-btn").forEach(b => {
      b.classList.toggle("active", b.dataset.level === level);
    });
    updateSubmitBtn();
  }

  function updateSubmitBtn() {
    const ready = selectedAreaId && selectedLevel;
    submitBtn.disabled = !ready;
    submitBtn.textContent = ready
      ? `Submit ${selectedLevel} Report`
      : (!selectedAreaId ? "Select an area first" : "Select a crowd level");
  }

  function showToast(msg, type) {
    toast.textContent = msg;
    toast.className = `show ${type}`;
    setTimeout(() => { toast.className = ""; }, 3000);
  }

  document.querySelectorAll(".level-btn").forEach(btn => {
    btn.addEventListener("click", () => selectLevel(btn.dataset.level));
  });

  document.getElementById("submit-btn").addEventListener("click", async () => {
    if (!selectedAreaId || !selectedLevel) return;

    submitBtn.disabled = true;
    submitBtn.textContent = "Submitting…";

    const body = {
      areaId:     Number(selectedAreaId),
      crowdLevel: selectedLevel,
      steward:    document.getElementById("steward").value || null,
      note:       document.getElementById("note").value    || null
    };

    try {
      const res = await fetch("/api/reports", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });

      if (!res.ok) throw new Error();

      showToast(`✅ ${selectedLevel} report submitted for ${areas.find(a => a.id == selectedAreaId)?.name}`, "success");

      // Reset level selection, keep area selected for fast follow-up
      selectedLevel = null;
      document.querySelectorAll(".level-btn").forEach(b => b.classList.remove("active"));
      document.getElementById("note").value = "";
      updateSubmitBtn();

      // Refresh area crowd levels on map
      loadAreas();
    } catch {
      showToast("❌ Could not submit report. Try again.", "error");
      updateSubmitBtn();
    }
  });

  async function loadAreas() {
    try {
      const res = await fetch("/api/areas");
      if (!res.ok) return;
      areas = await res.json();
      renderMap();
    } catch { /* offline / no server */ }
  }

  loadAreas();
</script>
</body>
</html>
