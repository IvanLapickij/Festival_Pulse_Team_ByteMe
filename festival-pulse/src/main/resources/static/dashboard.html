<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Festival Pulse Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" aria-label="Main navigation">
      <div class="brand">
        <img src="ByteMe.png" alt="" class="brand-mark" aria-hidden="true">
        <div>
          <strong>Festival Pulse</strong>
          <span>Live Operations</span>
        </div>
      </div>

      <nav class="nav-list">
        <a class="nav-link" href="#dashboard" data-route="dashboard">Dashboard</a>
        <a class="nav-link" href="#areas" data-route="areas">Areas</a>
        <a class="nav-link" href="#reports" data-route="reports">Reports</a>
        <a class="nav-link" href="#alerts" data-route="alerts">Alerts</a>
      </nav>
    </aside>

    <main class="content">
      <div class="page-heading">
        <div>
          <p id="page-kicker" class="kicker">Overview</p>
          <h1 id="page-title">Festival Pulse Dashboard</h1>
        </div>
        <button id="refresh-button" class="secondary-button" type="button">Refresh</button>
      </div>

      <section id="dashboard-page" class="page-view"></section>
      <section id="areas-page" class="page-view" hidden></section>
      <section id="reports-page" class="page-view" hidden></section>
      <section id="report-detail-page" class="page-view" hidden></section>
      <section id="alerts-page" class="page-view" hidden></section>
    </main>
  </div>

  <template id="festival-map-template">
    <svg id="festival-map" viewBox="0 0 920 580" role="img" aria-labelledby="map-title">
      <title id="map-title">Festival area crowd map</title>
      <defs>
        <linearGradient id="ground-grad" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#d4edda"/>
          <stop offset="100%" stop-color="#b8dfc2"/>
        </linearGradient>
        <filter id="glow-full" x="-30%" y="-30%" width="160%" height="160%">
          <feGaussianBlur stdDeviation="5" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="glow-medium" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur stdDeviation="2.5" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <linearGradient id="grad-low" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#4ade80"/>
          <stop offset="100%" stop-color="#16a34a"/>
        </linearGradient>
        <linearGradient id="grad-medium" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#fcd34d"/>
          <stop offset="100%" stop-color="#d97706"/>
        </linearGradient>
        <linearGradient id="grad-full" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#f87171"/>
          <stop offset="100%" stop-color="#b91c1c"/>
        </linearGradient>
        <linearGradient id="grad-unknown" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#94a3b8"/>
          <stop offset="100%" stop-color="#475569"/>
        </linearGradient>
      </defs>

      <!-- Ground -->
      <rect x="0" y="0" width="920" height="580" fill="url(#ground-grad)"/>
      <!-- Perimeter fence -->
      <rect class="map-perimeter" x="12" y="12" width="896" height="556" rx="16"/>

      <!-- Walkways -->
      <path class="map-path path-primary" d="M80 490 Q200 380 340 320 Q480 260 620 200 Q740 150 840 110"/>
      <path class="map-path path-secondary" d="M130 160 Q260 195 390 210 Q520 225 650 310 Q750 370 810 385"/>
      <path class="map-path path-cross" d="M340 320 Q368 342 396 360"/>

      <!-- Compass -->
      <g transform="translate(878,550)">
        <circle r="15" fill="rgba(0,0,0,0.22)"/>
        <text text-anchor="middle" dominant-baseline="central" fill="#fff" font-size="10" font-weight="900">N↑</text>
      </g>

      <g id="map-areas"></g>
    </svg>
  </template>

  <script src="app.js"></script>
</body>
</html>
