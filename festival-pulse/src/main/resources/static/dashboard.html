<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Festival Pulse Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" aria-label="Main navigation">
      <a class="brand" href="index.html">
        <img src="ByteMe.png" alt="" class="brand-mark" aria-hidden="true">
        <div>
          <strong>Festival Pulse</strong>
          <span>Live Operations</span>
        </div>
      </a>

      <nav class="nav-list">
        <a class="nav-link" href="#dashboard" data-route="dashboard" data-roles="organiser,steward,viewer">Dashboard</a>
        <a class="nav-link" href="#areas"     data-route="areas"     data-roles="organiser,steward,viewer">Areas</a>
        <a class="nav-link" href="#reports"   data-route="reports"   data-roles="organiser,steward,viewer">Reports</a>
        <a class="nav-link" href="#alerts"    data-route="alerts"    data-roles="organiser,viewer">Alerts</a>
        <a class="nav-link" href="steward.html"                      data-roles="steward">Submit Report</a>
      </nav>

      <div class="sidebar-footer">
        <div class="sidebar-role">
          <span class="sidebar-role-dot" id="role-dot"></span>
          <span id="role-label">Loading…</span>
        </div>
        <a href="index.html" class="sidebar-switch">Switch Role</a>
      </div>
    </aside>

    <main class="content">
      <div class="page-heading">
        <div>
          <p id="page-kicker" class="kicker">Overview</p>
          <h1 id="page-title">Festival Pulse Dashboard</h1>
        </div>
        <button id="refresh-button" class="secondary-button" type="button">Refresh</button>
      </div>

      <section id="dashboard-page" class="page-view"></section>
      <section id="areas-page"     class="page-view" hidden></section>
      <section id="reports-page"   class="page-view" hidden></section>
      <section id="report-detail-page" class="page-view" hidden></section>
      <section id="alerts-page"    class="page-view" hidden></section>
    </main>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
  <script src="app.js"></script>
</body>
</html>
